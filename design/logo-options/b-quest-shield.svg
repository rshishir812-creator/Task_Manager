<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="ChoreQuest Quest Shield">
  <!-- Shield: dark fill + teal stroke (so the teal arrow-check is visible inside) -->
  <path d="M 128 50
           C 106 62, 80 66, 64 66
           L 64 132
           C 64 176, 96 202, 128 214
           C 160 202, 192 176, 192 132
           L 192 66
           C 176 66, 150 62, 128 50 Z"
        fill="#0B0F2A" stroke="#00E5FF" stroke-width="14" stroke-linejoin="round"/>
  <!-- Arrow-check body — teal, ends at arrowhead base -->
  <path d="M 90 130 L 115 155 L 147 121"
        stroke="#00E5FF" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead: tip at (166,100), aligned to the check direction (115,155)→(166,100) -->
  <polygon points="166,100 157,130 137,111" fill="#00E5FF"/>
  <!-- Fletchings: 2 feather barbs perpendicular-ish to the shaft, on each side of the tail -->
  <path d="M 84 109 L 90 130" stroke="#00E5FF" stroke-width="9"
        stroke-linecap="round"/>
  <path d="M 69 124 L 90 130" stroke="#00E5FF" stroke-width="9"
        stroke-linecap="round"/>
</svg>
